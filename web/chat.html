<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Чат с Soiqweqq</title>
  <link rel="stylesheet" href="/style.css?v=27" />
</head>
<body class="chat-page-body">
  <div class="chat-window standalone" id="chatWindow">
    <div class="chat-header" id="chatHeader">
      <div class="chat-title">
        <span class="chat-avatar"><img src="/assets/chat_avatar_v26.jpg" alt="" /></span>
        <div>
          <strong>Чат с Soiqweqq</strong>
          <small><span class="status-dot status-offline"></span><span class="status-text">не в сети</span></small>
        </div>
      </div>
      <div class="chat-typing hidden" id="headerTyping"><span></span><span></span><span></span></div>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="message bot"><span>ну вот. отдельная вкладка. почти как отдельная жизнь, только дешевле.</span><small class="message-time">--:--</small></div>
    </div>
    <form class="chat-form" id="chatForm">
      <textarea id="chatInput" rows="1" placeholder="Напиши сообщение..."></textarea>
      <button class="emoji-toggle" type="button">♡</button>
      <button type="submit">➤</button>
      <div class="emoji-panel hidden" id="emojiPanel">
        <button type="button">😁</button><button type="button">🥰</button><button type="button">🥲</button><button type="button">😭</button><button type="button">😡</button><button type="button">🤡</button><button type="button">✨</button><button type="button">👍</button><button type="button">❤</button><button type="button">💔</button>
      </div>
    </form>
  </div>
  <script src="/app.js?v=27"></script>
</body>
</html>

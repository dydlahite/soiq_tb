<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Чат с Soiqweqq</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="chat-page">
  <div class="noise"></div>

  <main class="full-chat-shell">
    <section class="full-chat-card">
      <header class="full-chat-head">
        <a href="/" class="back-link">← на главную</a>
        <div>
          <h1>Soiqweqq</h1>
          <p><span class="online-dot"></span> онлайн, насколько это вообще прилично для кода</p>
        </div>
      </header>

      <div class="chat-body full" id="chatBody">
        <div class="message bot">
          <span>я здесь. пиши.</span>
        </div>
      </div>

      <form class="chat-form full" id="chatForm">
        <textarea id="chatInput" rows="2" placeholder="Напиши сообщение... Shift + Enter - перенос строки"></textarea>
        <button class="emoji-toggle" type="button" title="Смайлики">♡</button>
        <button type="submit">➤</button>
        <div class="emoji-panel hidden" id="emojiPanel" aria-label="Смайлики">
          <button type="button">😁</button>
          <button type="button">🥰</button>
          <button type="button">🐋</button>
          <button type="button">😭</button>
          <button type="button">😡</button>
          <button type="button">🤡</button>
          <button type="button">✨</button>
          <button type="button">👍</button>
          <button type="button">❤</button>
          <button type="button">💔</button>
        </div>
      </form>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>

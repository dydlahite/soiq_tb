<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Soiqweqq [bot]</title>
  <meta name="description" content="Soiqweqq - цифровая тень, веб-чат и ночной сайт с котами." />
  <link rel="stylesheet" href="/style.css?v=23" />
</head>
<body>
  <main class="page-shell" id="home">
    <section class="mockup-stage" aria-label="Soiqweqq landing">
      <picture>
        <source srcset="/assets/soiqweqq_final_mockup.webp" type="image/webp" />
        <img class="mockup-image" src="/assets/soiqweqq_final_mockup.jpg" alt="Soiqweqq site design" />
      </picture>

      <a class="hotspot nav-home" href="#home" aria-label="Главная"></a>
      <a class="hotspot nav-about" href="#about" aria-label="Обо мне"></a>
      <a class="hotspot launch-bot" data-telegram-link href="https://t.me/soiqweqq_bot" target="_blank" rel="noreferrer" aria-label="Запустить бота"></a>
      <button class="hotspot launch-site open-chat" type="button" aria-label="Запустить на сайте"></button>
      <button class="hotspot player-hotspot" type="button" aria-label="Плеер"></button>
      <span class="anchor-point" id="about"></span>
    </section>
  </main>

  <div class="chat-window hidden" id="chatWindow" aria-label="Чат с Soiqweqq">
    <div class="chat-header" id="chatHeader">
      <div class="chat-title">
        <span class="chat-avatar">♡</span>
        <div>
          <strong>Чат с Soiqweqq</strong>
          <small><span class="status-dot status-offline"></span><span class="status-text">не в сети</span></small>
        </div>
      </div>
      <div class="chat-controls">
        <a id="openFullChat" href="/chat" target="_blank" title="Открыть вкладку">□</a>
        <button id="minimizeChat" title="Свернуть" type="button">−</button>
        <button id="closeChat" title="Закрыть" type="button">×</button>
      </div>
    </div>

    <div class="chat-body" id="chatBody">
      <div class="message bot"><span>я здесь. не делай вид, что это не странно.</span><time></time></div>
    </div>

    <form class="chat-form" id="chatForm">
      <textarea id="chatInput" rows="1" placeholder="Напиши сообщение..."></textarea>
      <button class="emoji-toggle" type="button" title="Смайлики">♡</button>
      <button class="send-button" type="submit" title="Отправить">➤</button>
      <div class="emoji-panel hidden" id="emojiPanel" aria-label="Смайлики">
        <button type="button">😁</button><button type="button">🥰</button><button type="button">🥲</button><button type="button">😭</button><button type="button">😡</button><button type="button">🤡</button><button type="button">✨</button><button type="button">👍</button><button type="button">❤</button><button type="button">💔</button>
      </div>
    </form>
  </div>

  <button class="floating-chat open-chat" type="button" aria-label="Открыть чат">♡</button>
  <script src="/app.js?v=23"></script>
</body>
</html>
